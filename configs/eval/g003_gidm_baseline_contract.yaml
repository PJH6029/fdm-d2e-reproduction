  "official_metric_protocol": {
    "bin_ms": 50,
    "empty_bins_as_correct": false,
    "mouse_move": "sum dx/dy per 50ms bin; report pearson_x, pearson_y, scale_ratio_x, scale_ratio_y",
    "mouse_button": "exact per-button count match per 50ms bin; report button_accuracy",
    "keyboard": "exact press/release virtual-key count match per 50ms bin; report key_accuracy",
    "mouse_scroll": "exact scroll amount match per 50ms bin",
    "autoregressive": true,
    "teacher_forcing": false,
    "local_metric_mapping": {
      "keyboard_accuracy": "official keyboard.key_accuracy",
      "mouse_button_accuracy": "official mouse_button.button_accuracy",
      "mouse_button_f1": "local postprocessor over official predicted MCAP bins; not a paper-reported metric",
      "mouse_move_pearson": "mean of official mouse_move.pearson_x and mouse_move.pearson_y unless split report keeps axes separate",
      "mouse_scale_ratio": "mean of official scale_ratio_x and scale_ratio_y plus axis-specific values"
    }
  },
  "official_inference_defaults": {
    "model": "open-world-agents/Generalist-IDM-1B",
    "model_revision": "eae16486df3169aafe4a1d74fb2375185b5dc641",
    "device": "cuda",
    "max_context_length": 2048,
    "screen_resample_rate_hz": 20.0,
    "mouse_resample_rate_hz": 20.0,
    "keyboard_resample_rate_hz": 0.0,
    "action_topics": ["keyboard", "mouse/raw"],
    "time_shift_seconds": 0.1,
    "video_filter": "fps=60,scale=448:448",
    "trust_remote_code": true
  },
  "target_sequence": {
    "phase_1": {
      "id": "beat_paper_reported_metrics",
      "applies_to_goal": "G005-idm-full-paper-target",
      "primary_targets": {
        "pearson_x": 0.796,
        "pearson_y": 0.783,
        "keyboard_accuracy": 0.730,
        "mouse_button_accuracy": 0.957,
        "scale_ratio_x_max": 1.23,
        "scale_ratio_y_max": 1.31
      },
      "secondary_targets": {
        "mouse_button_f1": "not paper-reported; report locally and require improvement over existing IDM baseline",
        "no_button_false_positive_rate": "not paper-reported; report locally for FDM downstream calibration"
      }
    },
    "phase_2": {
      "id": "beat_released_gidm_exact_local_splits",
      "applies_to_goal": "G006-g-idm-exact-split",
      "prerequisite": "phase_1_pass",
      "baseline": "released open-world-agents/Generalist-IDM-1B at pinned revision on the same local heldout rows",
      "require_statistical_comparison": true
    }
  },
  "exact_split_contract": {
    "dataset_fingerprint": "a4d96c1b35a770a5ce426a3407af4fbd728ddac9a648cdb4746e2f827f803216",
    "external_artifact_manifest": "artifacts/reproducibility/external_artifact_manifest.json",
    "split_artifacts": {
      "split_contract": "artifacts/sources/d2e_full_split_contract.json",
      "data_universe": "artifacts/sources/d2e_full_data_universe_manifest.json",
      "temporal": "artifacts/sources/d2e_full_temporal_split_manifest.json",
      "heldout_recording": "artifacts/sources/d2e_full_heldout_recording_split_manifest.json",
      "heldout_game": "artifacts/sources/d2e_full_heldout_game_split_manifest.json"
    },
    "required_external_artifacts": {
      "target_all_eval": "outputs/data/d2e_full_corpus/target_all_eval.jsonl"
    },
    "required_splits": ["temporal", "heldout_recording", "heldout_game"],
    "resolution_policy": "run against the same full target rows already materialized from 480p and original sources; keep source_id/resolution tags in every work unit"
  },
  "exact_split_inference_plan": {
    "work_unit_key": ["split", "game", "recording_id", "source_id", "resolution", "segment_index"],
    "input_builder": {
      "source": "target_all_eval rows plus D2E source screen media references",
      "materialized_work_units": "outputs/gidm_release_exact_split/work_units.jsonl",
      "requires_original_ground_truth_mcap": true,
      "requires_video_or_media_ref": true
    },
    "commands": {
      "inference": "uv run inference.py <input_video> <predicted_mcap> --model open-world-agents/Generalist-IDM-1B --device cuda --max-context-length 2048 --time-shift 0.1",
      "evaluation": "uv run evaluate.py <ground_truth_mcap> <predicted_mcap> --bin-ms 50 --output <metrics_json>"
    },
    "outputs": {
      "root": "outputs/gidm_release_exact_split/",
      "predicted_mcaps": "outputs/gidm_release_exact_split/predicted_mcap/<split>/<work_unit>.mcap",
      "official_metrics": "outputs/gidm_release_exact_split/official_metrics/<split>/<work_unit>.json",
      "local_postprocessed_metrics": "outputs/gidm_release_exact_split/local_metrics/<split>/<work_unit>.json",
      "summary": "artifacts/eval/g006_gidm_exact_split_baseline_summary.json"
    },
    "resume_policy": {
      "status_file": "outputs/gidm_release_exact_split/work_unit_status.jsonl",
      "skip_when": "predicted_mcap and metric JSON hashes match status row",
      "retry_when": "missing output, hash mismatch, nonzero exit, or incomplete metric fields",
      "shard_by": "work_unit_key hash modulo worker_count"
    },
    "parallelization": {
      "preferred_gpu_count": 4,
      "execution": "one inference worker per GPU with recording-level shards; keep CPU ffmpeg/evaluate workers bounded to avoid starving GPU inference",
      "monitoring": "record nvidia-smi utilization, per-worker latency, failures, and completed work units"
    }
  },
  "environment_pinning": {
    "d2e_repo_commit": "80e98e26e4dc584ec76fec5789b4a97c275dd032",
    "hf_model_revision": "eae16486df3169aafe4a1d74fb2375185b5dc641",
    "python_entrypoints": ["inference.py", "evaluate.py"],
    "uv_required": true,
    "system_tools": ["ffmpeg", "ffprobe"],
    "gpu_dtype": "bfloat16 where supported by official code",
    "dependency_source": "official D2E scripts and their inline uv dependencies"
  },
  "fallback_semantics": {
    "released_gidm_unavailable": "block_exact_split_goal",
    "paper_metrics_substitute_for_exact_split": false,
    "requires_error_log": true,
    "allowed_diagnostic_fallbacks": [
      "record HF API/model download failure with revision and timestamp",
      "run a short official inference smoke only as dependency diagnosis",
      "continue G004/G005 paper-target work only if it does not claim exact-split released G-IDM comparison"
    ]
  },
  "claim_boundaries": [
    "This contract pins a public released G-IDM baseline and paper targets; it is not evidence that our model beat either target.",
    "Paper-reported metrics cannot substitute for released-model exact-split inference on local heldout rows.",
    "Mouse-button F1 and no-button false-positive rate are local additional metrics because D2E paper/repo report mouse-button accuracy, not F1 or FPR."
  ]
