{
  "schema": "streaming_fdm_train_config.v1",
  "model_name": "streaming_fdm_d2e_full_compact",
  "labels_path": "outputs/idm_streaming_d2e_full_compact/fdm_train_core_pseudolabels/pseudolabels.jsonl",
  "source_idm_metadata": "outputs/idm_streaming_d2e_full_compact/checkpoint_metadata.json",
  "records_path": "outputs/data/d2e_full_corpus/train_core.jsonl",
  "target_records_path": "outputs/data/d2e_full_corpus/target_all_eval.jsonl",
  "target_records_glob": "outputs/data/d2e_full_corpus_shards/shard_*/target_all_eval.jsonl",
  "train_prediction_summary_path": "artifacts/idm/idm_streaming_d2e_full_compact_fdm_train_core_pseudolabels_summary.json",
  "data_universe": "artifacts/sources/d2e_full_data_universe_manifest.json",
  "split_contract": "artifacts/sources/d2e_full_split_contract.json",
  "source_namespace": "d2e_full_corpus",
  "output_dir": "outputs/fdm_streaming_d2e_full_compact",
  "num_output_shards": 64,
  "materialization_workers": 16,
  "materialization_assume_recording_shards": true,
  "defer_canonical_materialization": true,
  "distributed_timeout_seconds": 86400,
  "summary_out": "outputs/fdm_streaming_d2e_full_compact/summary.json",
  "artifact_summary_out": "artifacts/fdm/fdm_streaming_d2e_full_compact_summary.json",
  "endpoints": "configs/eval/primary_endpoints.yaml",
  "baseline_names": [
    "noop",
    "global_majority",
    "last_seen_train"
  ],
  "fdm_train_fraction": 0.75,
  "min_target_per_recording": 1,
  "torch_idm_config": {
    "feature_mode": "summary_causal_compact_grid8_time_prior_action",
    "hidden_dim": 512,
    "depth": 3,
    "dropout": 0.05,
    "epochs": 6,
    "eval_interval_epochs": 1,
    "convergence_score": "composite_primary",
    "plateau_patience": 3,
    "plateau_min_relative_improvement": 0.01,
    "batch_size": 4096,
    "eval_batch_size": 4096,
    "convergence_eval_max_examples": 262144,
    "precompute_num_workers": 32,
    "stats_num_workers": 32,
    "lr": 0.0003,
    "weight_decay": 0.0001,
    "distributed_timeout_seconds": 86400,
    "categorical_min_count": 8,
    "categorical_loss_weight": 0.7,
    "categorical_pos_weight_cap": 30.0,
    "category_threshold": 0.35,
    "mouse_head_mode": "axis_softmax",
    "mouse_axis_loss_weight": 1.0,
    "mouse_regression_loss_weight": 0.5,
    "mouse_axis_decode_mode": "expected",
    "mouse_axis_temperature": 1.0,
    "mouse_output_gain": 1.0,
    "seed": 17,
    "training_cache_dir": "outputs/fdm_streaming_d2e_full_compact/torch_model/train_cache",
    "training_cache_chunk_size": 8192,
    "training_cache_num_workers": 16,
    "prediction_workers": 16,
    "prediction_cuda_devices": ["0", "1", "2", "3"],
    "validate_pseudolabels": false,
    "resume_predictions": true
  }
